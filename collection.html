<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pownce Pins | Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="collection-page content-page">
    <header class="site-header">
      <nav class="nav shell">
        <a class="brand" href="index.html" aria-label="Pownce Pins home">
          <img class="nav-logo" src="assets/pins/Logo.png" alt="Pownce Pins logo" />
        </a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="shop.html">Shop</a>
          <a class="active" href="collection.html">Collection</a>
          <a href="creator-portal.html">Creator Portal</a>
          <a href="quote.html">Bulk Quote</a>
          <a href="collaborate.html">Collaborate</a>

        </div>
        <button id="cartToggle" class="cart-btn">Cart <span id="cartCount">0</span></button>
      </nav>
    </header>

    <main class="page shell">

      <section class="section panel" style="padding-bottom: 0.7rem;">
        <div class="collection-tabs">
          <button class="collection-tab active" id="tabStoryPins" type="button">Story Pins</button>
          <button class="collection-tab" id="tabCharacterPins" type="button">Character Pins</button>
        </div>
      </section>

      <section class="section">
        <div id="collectionGrid" class="collection-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="inner shell">
        <span>© 2026 Pownce Pins</span>
        <div class="footer-links">
          <a href="tos.html">Terms and Privacy</a>
          <a href="faq.html">FAQ</a>
          <a href="contact-us.html">Contact Us</a>
        </div>
      </div>
    </footer>

    <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
      <div class="cart-header">
        <h3>Your Cart</h3>
        <button id="closeCart" class="small-btn">Close</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="total-row"><span>Subtotal</span><strong id="cartTotal">$0.00</strong></div>
        <button id="checkoutBtn" class="btn btn-primary full">Checkout</button>
      </div>
    </aside>
    <div id="backdrop" class="backdrop" hidden></div>
    <!-- Modal for Story Pin Trading Card Carousel -->
    <div id="storyModal" class="story-modal" hidden>
      <div class="story-modal-content">
        <button class="story-modal-close" aria-label="Close">&times;</button>
        <div class="story-carousel story-carousel-fixed">
          <div class="carousel-img-frame">
            <img id="imgCurrent" class="carousel-img active" />
            <img id="imgNext" class="carousel-img" />
          </div>
          <button id="carouselPrev" class="carousel-arrow left">❮</button>
          <button id="carouselNext" class="carousel-arrow right">❯</button>
        </div>
        <div class="modal-product-info">
          <h3 class="product-title">Rankless Story Enamel Pin</h3>
          <p class="product-desc">Rankless is a graphic novel. This is the March Pick.</p>
          <div class="product-meta-row">
            <span class="product-tag">Story Pin</span>
            <span class="product-price">$40.00</span>
          </div>
          <div class="product-stock">Stock: 50</div>
          <button class="btn btn-primary full" data-add="p000">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
    <script src="storyPinUrls.js"></script>
    <script src="script.js"></script>
  </body>
</html>
