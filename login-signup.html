<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pownce Pins – Login / Signup</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f7f7fa; margin: 0; }
    .auth-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px #0001; padding: 2.5rem 2rem; }
    .auth-container h2 { margin-top: 0; text-align: center; }
    .auth-tabs { display: flex; margin-bottom: 2rem; }
    .auth-tab { flex: 1; padding: 0.75rem 0; text-align: center; cursor: pointer; border-bottom: 2px solid #eee; font-weight: 500; transition: border 0.2s; }
    .auth-tab.active { border-bottom: 2px solid #6c63ff; color: #6c63ff; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .auth-form input { padding: 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    .auth-form button { padding: 0.75rem; background: #6c63ff; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .auth-form button:hover { background: #574fd6; }
    .divider { text-align: center; color: #aaa; margin: 1.5rem 0 0.5rem; font-size: 0.95rem; }
    .google-btn { background: #fff; color: #444; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .google-btn img { width: 20px; height: 20px; }
    .auth-message { text-align: center; margin-top: 1rem; color: #e74c3c; font-weight: 500; }
    @media (max-width: 500px) { .auth-container { padding: 1.5rem 0.5rem; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-tabs">
      <div class="auth-tab active" id="login-tab">Login</div>
      <div class="auth-tab" id="signup-tab">Sign Up</div>
    </div>
    <form class="auth-form" id="login-form">
      <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
      <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Login</button>
      <div class="divider">or</div>
      <button type="button" class="google-btn" id="google-login">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">Sign in with Google
      </button>
    </form>
    <form class="auth-form" id="signup-form" style="display:none;">
      <input type="email" id="signup-email" placeholder="Email" required autocomplete="username">
      <input type="password" id="signup-password" placeholder="Password" required autocomplete="new-password">
      <button type="submit">Sign Up</button>
      <div class="divider">or</div>
      <button type="button" class="google-btn" id="google-signup">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">Sign up with Google
      </button>
    </form>
    <div class="auth-message" id="auth-message"></div>
  </div>
  <script>
    // Supabase config
    const supabaseUrl = 'https://hszukdjgqrjkbuxcjbud.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzenVrZGpncXJqa2J1eGNqYnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzM0NjUsImV4cCI6MjA4ODkwOTQ2NX0.H4qR-S4b_e-DuPLHhJR9qiJasaVokXDz1RCyu2JN_Cc';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Tab switching
    const loginTab = document.getElementById('login-tab');
    const signupTab = document.getElementById('signup-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const authMessage = document.getElementById('auth-message');

    loginTab.onclick = () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginForm.style.display = '';
      signupForm.style.display = 'none';
      authMessage.textContent = '';
    };
    signupTab.onclick = () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupForm.style.display = '';
      loginForm.style.display = 'none';
      authMessage.textContent = '';
    };

    // Login
    loginForm.onsubmit = async (e) => {
      e.preventDefault();
      authMessage.textContent = '';
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        authMessage.style.color = '#e74c3c';
        if (error.message && error.message.toLowerCase().includes('invalid login credentials')) {
          authMessage.innerHTML = 'Invalid login credentials.<br>If you registered with Google, please use <b>Sign in with Google</b>.';
        } else {
          authMessage.textContent = error.message;
        }
      } else {
        authMessage.style.color = '#27ae60';
        authMessage.textContent = 'Login successful! Redirecting...';
        setTimeout(() => window.location.href = 'index.html', 1200);
      }
    };

    // Signup
    signupForm.onsubmit = async (e) => {
      e.preventDefault();
      authMessage.textContent = '';
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const { data, error } = await supabaseClient.auth.signUp({ email, password });
      if (error) {
        authMessage.style.color = '#e74c3c';
        if (error.message && error.message.toLowerCase().includes('user already registered')) {
          authMessage.innerHTML = 'This email is already registered.<br>If you signed up with Google, please use <b>Sign in with Google</b>.';
        } else {
          authMessage.textContent = error.message;
        }
      } else {
        // Try to sign in to detect if the account is already registered (esp. with OAuth)
        const { error: signInError } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (signInError && signInError.message && signInError.message.toLowerCase().includes('invalid login credentials')) {
          authMessage.style.color = '#e74c3c';
          authMessage.innerHTML = 'This email is already registered.<br>If you signed up with Google, please use <b>Sign in with Google</b>.';
        } else {
          // Switch to login tab and show message
          loginTab.classList.add('active');
          signupTab.classList.remove('active');
          loginForm.style.display = '';
          signupForm.style.display = 'none';
          authMessage.style.color = '#27ae60';
          authMessage.textContent = 'Signup successful! Please check your email to confirm, then log in.';
        }
      }
    };

    // Google login/signup (attach after DOM loaded, prevent default)
    function attachGoogleHandlers() {
      console.log('Attaching Google handlers. Supabase:', typeof window.supabase, 'Client:', typeof supabaseClient);
      document.getElementById('google-login').addEventListener('click', async (e) => {
        e.preventDefault();
        console.log('Google login button clicked');
        const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
        if (error) authMessage.textContent = error.message;
      });
      document.getElementById('google-signup').addEventListener('click', async (e) => {
        e.preventDefault();
        console.log('Google signup button clicked');
        const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
        if (error) authMessage.textContent = error.message;
      });
    }
    // Attach after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', attachGoogleHandlers);
    } else {
      attachGoogleHandlers();
    }
  </script>
</body>
</html>
